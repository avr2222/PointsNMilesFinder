name: Daily Data Refresh

on:
  schedule:
    - cron: '30 1 * * *'  # 1:30 AM UTC = ~7:00 AM IST
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Fetch exchange rate and update deals
        run: node fetch-deals.js
        working-directory: scripts
        env:
          DATA_DIR: ${{ github.workspace }}/public/data
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Send email alert for new hot deals
        run: node alert.js
        working-directory: scripts
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          DATA_DIR:         ${{ github.workspace }}/public/data
          CONFIG_PATH:      ${{ github.workspace }}/public/config/user-config.json
        continue-on-error: true  # Alert failure must not fail the workflow

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/deals.json
          git add public/data/deals-previous.json
          git add public/data/last-updated.json
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date -u '+%Y-%m-%d')"
          git push
        continue-on-error: false

  deploy:
    needs: refresh-data
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: write
